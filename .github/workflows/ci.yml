name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

permissions:
  contents: read

jobs:
  pr-governance-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Validate PR governance sections
        uses: actions/github-script@v7
        with:
          script: |
            const pr = await github.rest.pulls.get({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: context.payload.pull_request.number,
            });
            const body = pr.data.body ?? "";

            const requiredSections = [
              "## Summary",
              "## What Changed",
              "## Key Files",
              "## Validation",
              "## Notes",
              "## Reuse Checklist",
            ];

            const missingSections = requiredSections.filter((section) => !body.includes(section));

            const requiredChecks = [
              /- \[x\] I searched existing modules before adding new code\./i,
              /- \[x\] I reused existing utilities\/components where possible\./i,
              /- \[x\] I only introduced new code where no reusable path existed\./i,
            ];

            const missingChecks = requiredChecks
              .map((pattern, index) => ({ pattern, index }))
              .filter(({ pattern }) => !pattern.test(body))
              .map(({ index }) => index + 1);

            if (missingSections.length === 0 && missingChecks.length === 0) {
              core.info("PR governance validation passed.");
              return;
            }

            const messages = [];
            if (missingSections.length > 0) {
              messages.push(`Missing required PR sections: ${missingSections.join(", ")}`);
            }
            if (missingChecks.length > 0) {
              messages.push(`Reuse checklist items not checked: ${missingChecks.join(", ")}`);
            }

            core.setFailed(messages.join("\n"));

  quality-check:
    name: quality-check
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run quality:check

  quality-check-matrix:
    name: quality-check-matrix (node ${{ matrix.node-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run quality checks
        run: npm run quality:check

  release-policy-check:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Validate version and changelog policy
        run: npm run release:policy:check
